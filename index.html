<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Arena God Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Arena God Tracker</h1>
    <p id="subtitle">Shared champion-win checklist, synced from each player's League client.</p>
  </header>

  <main>
    <div id="status">Loading data...</div>

    <div id="controls" class="hidden">
      <input id="search" type="search" placeholder="Search champion..." />
      <label>Greyed based on: <select id="focusPlayer"></select></label>
      <label><input id="hideDone" type="checkbox" /> Hide champions everyone has</label>
      <label><input id="onlyMissing" type="checkbox" /> Only show champions nobody has</label>
    </div>

    <div id="summary" class="hidden"></div>

    <div id="gridWrap" class="hidden">
      <div id="grid" class="champ-grid"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
