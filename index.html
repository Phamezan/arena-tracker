<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Alabama Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1><a href="https://github.com/Phamezan/arena-tracker/releases/tag/v1.0.1" target="_blank">Alabama Tracker</a></h1>
  </header>

  <main>
    <div id="status">Loading data...</div>

    <div id="leaderboard" class="hidden"></div>

    <div id="controls" class="hidden">
      <input id="search" type="search" placeholder="Search champion..." />
      <label>Greyed based on: <select id="focusPlayer"></select></label>
      <label><input id="groupByWins" type="checkbox" /> Group by wins</label>
      <label><input id="hideIcons" type="checkbox" /> Hide icons</label>
      <label><input id="onlyMissing" type="checkbox" /> Only show champions nobody has</label>
    </div>

    <div id="summary" class="hidden"></div>

    <div id="gridWrap" class="hidden">
      <div id="grid"></div>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
</body>

</html>
