<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Alabama Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <h1>Alabama Tracker</h1>
    <p></p>
  </header>

  <main>
    <div id="status">Loading data...</div>

    <div id="leaderboard" class="hidden"></div>

    <div id="controls" class="hidden">
      <input id="search" type="search" placeholder="Search champion..." />
      <label>Greyed based on: <select id="focusPlayer"></select></label>
      <label><input id="groupByWins" type="checkbox" /> Group by wins</label>
      <label><input id="hideDone" type="checkbox" /> Hide champions everyone has</label>
      <label><input id="onlyMissing" type="checkbox" /> Only show champions nobody has</label>
    </div>

    <div id="summary" class="hidden"></div>

    <div id="gridWrap" class="hidden">
      <div id="grid"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>

</html>
